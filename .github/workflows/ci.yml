name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run lint

  unit-tests:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run test

  e2e-tests:
    name: E2E Tests
    needs: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run in the official Playwright image: browsers + system deps are baked in, so
    # there's no runtime `playwright install` (its browser download reliably hung on
    # hosted runners). The image tag MUST match the pinned playwright version above.
    container:
      image: mcr.microsoft.com/playwright:v1.61.0-noble
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
      - run: bun install --frozen-lockfile
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
